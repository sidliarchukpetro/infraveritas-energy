# Phase 4 add-on: TimescaleDB для per-device historical readings
# Spec: docs/specs/phase4_design.md §6.1
#
# Usage:
#   1. Merge у existing aggregator docker-compose.yml, або:
#   2. docker compose -f docker-compose.yml -f infra/docker-compose.phase4.yml up -d
#
# Required environment у .env:
#   POSTGRES_PASSWORD=<secure-random-string>     # mandatory
#   POSTGRES_USER=infraveritas                   # default
#   POSTGRES_DB=infraveritas_energy              # default
#
# Migrations у db/migrations/ автоматично запускаються при першому старті контейнера
# через mount у /docker-entrypoint-initdb.d/.

version: "3.8"

services:
  postgres:
    image: timescale/timescaledb:latest-pg15
    container_name: infraveritas-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-infraveritas}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
      POSTGRES_DB: ${POSTGRES_DB:-infraveritas_energy}
      # TimescaleDB tuning recommendations for development:
      TS_TUNE_MEMORY: 2GB
      TS_TUNE_NUM_CPUS: 2
    volumes:
      - pg_data:/var/lib/postgresql/data
      # Auto-run migrations on first init (idempotent SQL)
      - ../aggregator/db/migrations:/docker-entrypoint-initdb.d:ro
    ports:
      # Bind localhost only — не expose publicly у production
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-infraveritas} -d ${POSTGRES_DB:-infraveritas_energy}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Aggregator service depends on postgres being healthy
  # NB: якщо aggregator уже defined у головному docker-compose.yml — додай туди
  # секцію depends_on замість дублювання сервісу тут:
  #
  #   aggregator:
  #     depends_on:
  #       postgres:
  #         condition: service_healthy
  #     environment:
  #       DATABASE_URL: postgres://${POSTGRES_USER:-infraveritas}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-infraveritas_energy}

volumes:
  pg_data:
    name: infraveritas_pg_data
