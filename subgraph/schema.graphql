# InfraVeritas Energy subgraph schema (v0.0.2)
# Spec: docs/specs/phase5_design.md §3
#
# Design note (v0.0.2):
#   V3.ProofSubmitted емітіть `deviceIdBytes32` = bytes32 cast of payload's
#   uint64 device_id field — це semantic user-facing ID, не cryptographic
#   pubKeyHash з DeviceRegistry. Тому Submission і Device — НЕЗАЛЕЖНІ
#   сутності у цій схемі. Vони не linkable через event payloads.
#
#   Якщо у майбутньому потрібен зв'язок — або V3 має емітити pubKeyHash як
#   додатковий topic, або aggregator зберігає mapping deviceId→pubKeyHash
#   окремо.

# -----------------------------------------------------------
# Device — один registered IoT пристрій (з DeviceRegistry)
# -----------------------------------------------------------
type Device @entity(immutable: false) {
  "Identifier: pubKeyHash (keccak256 of P-256 pubkey), as hex string with 0x prefix"
  id: ID!

  "Registered latitude × 10^7 (signed)"
  latE7: Int!

  "Registered longitude × 10^7 (signed)"
  lonE7: Int!

  "Block timestamp when device was registered"
  registeredAt: BigInt!

  "Operator address that registered the device"
  registeredBy: Bytes!

  "Current lifecycle status — set by DeviceRegistry events"
  status: DeviceStatus!

  "Block timestamp when device was revoked (null if never revoked)"
  revokedAt: BigInt

  "Block timestamp of last reactivation (null if never reactivated)"
  reactivatedAt: BigInt

  "Block timestamp of last suspension (null if never suspended)"
  suspendedAt: BigInt
}

enum DeviceStatus {
  Active
  Revoked
  Suspended
}

# -----------------------------------------------------------
# Submission — один proof submission accepted by V3
# -----------------------------------------------------------
type Submission @entity(immutable: true) {
  "Identifier: sessionKey from event (already unique per V3's replay protection)"
  id: ID!

  "Raw deviceIdBytes32 from ProofSubmitted event — bytes32 cast of payload uint64 device_id."
  deviceIdBytes: Bytes!

  "Timestamp parameter from event (uint64, payload's epoch_start_ts)"
  timestamp: BigInt!

  "Block where the submitProof tx landed"
  blockNumber: BigInt!

  "Timestamp of the block (UTC unix seconds)"
  blockTimestamp: BigInt!

  "Seconds between this and previous submission for same device"
  gapFromPrevious: BigInt!

  "True if gap > MAX_GAP_SECONDS (48 hours) — device returned after disconnection"
  postDisconnection: Boolean!

  "Transaction hash for Etherscan link"
  txHash: Bytes!
}

# -----------------------------------------------------------
# DailyStat — per-device-id aggregate for one UTC day
# Keyed by raw deviceIdBytes (event payload), not Device entity.
# -----------------------------------------------------------
type DailyStat @entity(immutable: false) {
  "Identifier: dayStartTs-deviceIdBytesHex"
  id: ID!

  "Unix timestamp of day start (UTC midnight)"
  dayStartTs: BigInt!

  "Raw deviceIdBytes from event (see Submission.deviceIdBytes note)"
  deviceIdBytes: Bytes!

  "Submissions on this day for this device-id"
  submissionCount: Int!

  "Post-disconnection submissions on this day"
  postDisconnectionCount: Int!
}

# -----------------------------------------------------------
# Protocol — singleton with global counters
# -----------------------------------------------------------
type Protocol @entity(immutable: false) {
  "Always '0' — singleton ID"
  id: ID!

  "Total devices ever registered (Active + Revoked + Suspended)"
  totalDevices: Int!

  "Devices currently in Active status"
  activeDevices: Int!

  "Devices currently in Revoked status"
  revokedDevices: Int!

  "Devices currently in Suspended status"
  suspendedDevices: Int!

  "All proof submissions ever indexed"
  totalSubmissions: Int!

  "Submissions flagged with postDisconnection (across all device-ids)"
  totalPostDisconnections: Int!
}
