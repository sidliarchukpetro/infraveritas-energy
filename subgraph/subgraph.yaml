specVersion: 1.0.0
description: InfraVeritas Energy — indexes ProofSubmitted events from V3 and device lifecycle from DeviceRegistry (Sepolia)
repository: https://github.com/sidliarchukpetro/infraveritas-energy
schema:
  file: ./schema.graphql

dataSources:
  # -----------------------------------------------------------
  # V3 contract — ProofSubmitted events
  # -----------------------------------------------------------
  - kind: ethereum
    name: EnergyProofRegistryV3
    network: sepolia
    source:
      address: "0xf21d900e43214b0abf489f8d6862352aabb09da3"
      abi: EnergyProofRegistryV3
      startBlock: 10852229
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Device
        - Submission
        - DailyStat
        - Protocol
      abis:
        - name: EnergyProofRegistryV3
          file: ./abis/EnergyProofRegistryV3.json
      eventHandlers:
        - event: ProofSubmitted(indexed bytes32,indexed bytes32,uint64,uint64,bool)
          handler: handleProofSubmitted
      file: ./src/v3-mapping.ts

  # -----------------------------------------------------------
  # DeviceRegistry — device lifecycle events
  # -----------------------------------------------------------
  - kind: ethereum
    name: DeviceRegistry
    network: sepolia
    source:
      address: "0x6249935e8f293cac2a7c4ce3717a14a8b1e83e03"
      abi: DeviceRegistry
      startBlock: 10851844
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Device
        - Protocol
      abis:
        - name: DeviceRegistry
          file: ./abis/DeviceRegistry.json
      eventHandlers:
        - event: DeviceRegistered(indexed bytes32,int32,int32,uint64,indexed address)
          handler: handleDeviceRegistered
        - event: DeviceRevoked(indexed bytes32,indexed address)
          handler: handleDeviceRevoked
        - event: DeviceReactivated(indexed bytes32,indexed address)
          handler: handleDeviceReactivated
        - event: DeviceSuspended(indexed bytes32,indexed address)
          handler: handleDeviceSuspended
      file: ./src/device-registry-mapping.ts
