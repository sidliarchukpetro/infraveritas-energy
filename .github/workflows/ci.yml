name: CI
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  forge-test:
    name: Forge build and test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable
      - name: Show versions
        run: forge --version
      - name: Forge build
        run: forge build --skip "echidna/**"
        working-directory: contracts
      - name: Forge test
        run: forge test -vvv --skip "echidna/**"
        working-directory: contracts
  slither:
    name: Slither static analysis
    runs-on: ubuntu-latest
    needs: forge-test
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable
      - name: Install Slither
        run: pip install slither-analyzer==0.11.5
      - name: Forge build for Slither
        run: forge build --skip "echidna/**"
        working-directory: contracts
      - name: Run Slither on new contracts (V3 + DeviceRegistry, blocking)
        run: slither . --config-file slither.config.json
        working-directory: contracts
  edge-test:
    name: Edge HAL Python tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: 'edge/pyproject.toml'
      - name: Install edge package with test deps
        run: pip install -e ".[test]"
        working-directory: edge
      - name: Run pytest
        run: pytest -v
        working-directory: edge
  aggregator-test:
    name: Aggregator TypeScript tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'aggregator/package-lock.json'
      - name: Install
        run: npm ci
        working-directory: aggregator
      - name: Typecheck
        run: npm run typecheck
        working-directory: aggregator
      - name: Test
        run: npm test
        working-directory: aggregator

  docker-build:
    name: Aggregator Docker image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v3
      - name: Build aggregator image (no push)
        uses: docker/build-push-action@v6
        with:
          context: aggregator
          push: false
          tags: infraveritas-aggregator:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
